name: Validate docs

on:
  pull_request:
    branches:
      - main
  # Also run on direct pushes to main as a backstop
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Format check and validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tools
        run: |
          pip install docuchango flowmark
          npm install -g markdown-link-check

      - name: Validate
        run: make validate
